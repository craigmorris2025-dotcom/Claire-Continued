
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Claire - Real Pipeline</title>

<style>
:root {
  --bg:#0a0b1e;
  --card:#1a1b2e;
  --accent:#6c63ff;
  --text:#e8e8f0;
  --success:#00d4aa;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

.header{
  display:flex;
  align-items:center;
  padding:15px;
  background:var(--card);
}

.search{
  flex:1;
  margin-left:20px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2a2b4a;
  color:white;
}

.pipeline{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  margin:30px;
}

.node{
  text-align:center;
  opacity:.25;
  transition:.4s;
  width:140px;
}

.node.active{
  opacity:1;
  transform:scale(1.15);
  color:var(--accent);
}

.node.done{
  opacity:1;
  color:var(--success);
}

.output{
  margin:20px;
  padding:20px;
  background:var(--card);
  border-radius:10px;
  min-height:220px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="header">
  <b>⬡ CLAIRE (REAL SYSTEM)</b>
  <input id="input" class="search" placeholder="Enter idea..." onkeydown="run(event)">
</div>

<div class="pipeline" id="pipeline"></div>

<div id="output" class="output">System ready.</div>

<script>

const API = "http://localhost:8000/evaluate";

/* REAL PHASES (mapped to backend) */
const STAGES = [
  "ingestion",
  "semantic",
  "fusion",
  "scoring",
  "innovation",
  "breakthrough",
  "forecasting",
  "deal",
  "decision",
  "portfolio",
  "compliance"
];

const pipelineDiv = document.getElementById("pipeline");

STAGES.forEach((s,i)=>{
  const div = document.createElement("div");
  div.className = "node";
  div.id = "n"+i;
  div.innerHTML = s.toUpperCase();
  pipelineDiv.appendChild(div);
});

function reset(){
  STAGES.forEach((_,i)=>{
    const el = document.getElementById("n"+i);
    el.classList.remove("active","done");
  });
}

function activate(i){
  document.getElementById("n"+i).classList.add("active");
}

function complete(i){
  const el = document.getElementById("n"+i);
  el.classList.remove("active");
  el.classList.add("done");
}

function sleep(ms){
  return new Promise(r=>setTimeout(r,ms));
}

async function type(el,text){
  el.innerHTML += text + "\n";
}

async function run(e){
  if(e.key !== "Enter") return;

  const input = document.getElementById("input").value.trim();
  const out = document.getElementById("output");

  if(!input) return;

  reset();
  out.innerHTML = "⚡ Running Full Claire System...\n";

  try{

    /* SINGLE REAL CALL */
    const res = await fetch(API,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        input_text: input,
        mode: "deterministic"
      })
    });

    const data = await res.json();

    const engines = data.engine_details;

    let i = 0;

    for(const key of STAGES){

      activate(i);

      await type(out, `→ ${key.toUpperCase()}`);

      if(engines[key]){
        await type(out, `score: ${engines[key].score}`);
        await type(out, `phase: ${engines[key].phase}`);
      }

      complete(i);

      await sleep(150);
      i++;
    }

    await type(out, "-------------------");
    await type(out, `Decision: ${data.decision_classification}`);
    await type(out, `Breakthrough: ${data.breakthrough_classification}`);
    await type(out, `Confidence: ${data.confidence}`);
    await type(out, `Domain: ${data.domain}`);

    await type(out, "✅ SYSTEM COMPLETE");

  }catch(err){
    out.innerHTML += "\n❌ ERROR: "+err.message;
    console.error(err);
  }
}

</script>

</body>
</html>
