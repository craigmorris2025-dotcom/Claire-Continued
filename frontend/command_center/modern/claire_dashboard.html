<!DOCTYPE html>
<html lang="en" data-claire-dashboard="canonical-cockpit">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claire AI - Syntalion Intelligence Cockpit - ACS2 v19.61</title>
<link rel="stylesheet" href="claire_dashboard.css">
</head>
<body>
<div class="shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <div class="logo-icon">C</div>
        <div class="logo-text">Claire AI</div>
      </div>
      <div class="logo-sub">Syntalion - ACS2 Platform</div>
    </div>
    <nav class="nav" id="nav-items"></nav>
    <div class="mode-badge mode-hybrid" id="mode-badge">MODE LOADING</div>
    <div class="sidebar-footer">
      <div class="health-row">
        <span>System Health</span>
        <span style="display:flex;align-items:center;gap:5px;color:var(--accent-green);font-weight:600">
          <span class="health-dot"></span><span id="health-status-text">LOADING</span>
        </span>
      </div>
      <div class="health-row"><span>API</span><span style="font-family:monospace;font-size:10px">localhost:8000</span></div>
      <div class="health-row"><span>Version</span><span>v19.61</span></div>
      <div class="health-row" style="font-family:monospace;font-size:9px;color:var(--text-muted)">
        <span id="live-clock"></span>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <header class="topbar">
      <div>
        <div class="topbar-title">Overview</div>
        <div class="topbar-sub">Claire AI - ACS2 Platform - v19.61</div>
      </div>
      <div class="search-bar">
        <span style="color:var(--text-muted);font-size:13px">Search</span>
        <input type="text" placeholder="Search the web through Claire">
        <button class="search-submit-btn" type="button" title="Search web through Claire" aria-label="Search web through Claire">Search</button>
        <button class="search-web-btn" type="button" title="Open external search for this query" aria-label="Open external search for this query">Web Search</button>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-ghost" data-action="/runtime/continuous/start">+ New Run</button>
        <button
          class="btn btn-primary"
          data-action="/evaluate"
          data-prompt="Run the 30-stage Claire lifecycle through the default signal, trend, thesis, and portfolio intelligence path using the local governed project files."
        >Run Portfolio Path</button>
        <div class="notif-btn">Alert<div class="notif-dot"></div></div>
      </div>
    </header>
    <div class="content" id="main-content"></div>
  </div>

</div>
<script src="claire_dashboard.js"></script>
</body>
</html>
