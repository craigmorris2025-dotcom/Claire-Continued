
name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: python -m pip install -r requirements.txt
      - name: Enforce runtime_core migration boundary
        run: python tools/check_migration_boundaries.py
      - name: Run full test suite
        run: python -B -m pytest tests -q --tb=short
